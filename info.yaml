# Tiny Tapeout project information
project:
  title:        "PRBS Generator + BER Tester"
  author:       "Vladimir Velikanov"
  discord:      ""
  description:  "Selectable PRBS-7/15/31 generator with self-synchronizing BER checker, sync-loss detector and programmable error injector"
  language:     "Verilog"
  clock_hz:     10000000   # any; one PRBS bit per clock

  tiles: "1x1"

  top_module: "tt_um_vvelikanov_prbs_bert"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "prbs_sel[0] (00=PRBS-7, 01=PRBS-15, 1x=PRBS-31)"
  ui[1]: "prbs_sel[1]"
  ui[2]: "inject single error (rising edge)"
  ui[3]: "periodic error injection enable"
  ui[4]: "injection rate (0: every 512 bits, 1: every 8192 bits)"
  ui[5]: "clear error counter + sticky sync-loss flag"
  ui[6]: "counter byte select (0: bits 7:0, 1: bits 15:8)"
  ui[7]: "rx serial input (loop back from uo[0])"

  # Outputs
  uo[0]: "tx PRBS serial output"
  uo[1]: "sync (checker locked)"
  uo[2]: "error pulse (gated by sync)"
  uo[3]: "sync lost (sticky)"
  uo[4]: "injection pulse"
  uo[5]: "rx echo (registered rx input)"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (all outputs)
  uio[0]: "error counter bit 0/8"
  uio[1]: "error counter bit 1/9"
  uio[2]: "error counter bit 2/10"
  uio[3]: "error counter bit 3/11"
  uio[4]: "error counter bit 4/12"
  uio[5]: "error counter bit 5/13"
  uio[6]: "error counter bit 6/14"
  uio[7]: "error counter bit 7/15"

yaml_version: 6
